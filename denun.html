<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>EcoDenúncia</title>
    <link rel="stylesheet" href="css/geral.css">
    <link rel="stylesheet" href="css/home.css">
    <script src="https://unpkg.com/@phosphor-icons/web"></script>
</head>
<body>
<div class="app-container">

    <header class="header-home">
        <div class="logo">
            <div class="logo-icon"><i class="ph ph-leaf"></i></div>
            <h1>EcoDenúncia</h1>
        </div>
        <p class="logo-sub">Juntos por uma cidade mais limpa</p>
        <div class="header-btns">
            <button class="btn btn-collect" onclick="window.location.href='pontos.html'">
                <i class="ph ph-map-pin"></i> Ver Pontos de Coleta
            </button>
            <button class="btn btn-report" onclick="window.location.href='denuncia.html'">
                <i class="ph ph-warning"></i> Fazer Denúncia
            </button>
        </div>
    </header>

    <main class="home-main" id="home-main">

        <!-- ESTATÍSTICAS -->
        <div class="stats-row">
            <div class="stat-card">
                <div class="stat-num" id="total-denuncias">0</div>
                <div class="stat-label">Denúncias</div>
            </div>
            <div class="stat-card">
                <div class="stat-num" id="total-resolvidas">0</div>
                <div class="stat-label">Resolvidas</div>
            </div>
            <div class="stat-card">
                <div class="stat-num">3</div>
                <div class="stat-label">Pontos</div>
            </div>
        </div>

        <!-- FEED -->
        <div class="section-header">
            <h2>Denúncias Recentes</h2>
        </div>

        <div class="feed" id="feed">
            <div class="empty-state">
                <i class="ph ph-smiley" style="font-size:28px; display:block; margin-bottom:8px;"></i>
                Nenhuma denúncia ainda.<br>Seja o primeiro a reportar!
            </div>
        </div>

    </main>
</div>

<script src="script/home.js"></script>
</body>
</html>
