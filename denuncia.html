<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Nova Denúncia</title>
    <link rel="stylesheet" href="css/denun.css">
    <script src="https://unpkg.com/@phosphor-icons/web"></script>
</head>
<body>
    <div class="app-container">
        <header class="header-small">
            <a href="denun.html" class="back-button"><i class="ph ph-arrow-left"></i></a>
            <h1>Nova Denúncia</h1>
        </header>
        <main class="form-container">
            <div class="photo-upload"><i class="ph ph-camera"></i><span>Adicionar Foto</span></div>
            <div class="input-group">
                
                <label><i class="ph ph-map-pin"></i> Localização:</label>
                <input type="text" placeholder="Rua das Flores, Centro">
            </div>
            <textarea placeholder="Descreva o problema..." rows="4"></textarea>
            <p class="label-text">Tipo de Resíduo:</p>
            <div class="type-selector">
                <button class="type-btn">Comum</button>
                <button class="type-btn active">Reciclável</button>
                <button class="type-btn">Entulho</button>
            </div>
            <div class="input-group">
                <label>Contato (opcional)</label>
                <input type="text" placeholder="Seu telefone ou e-mail">
            </div>
            <button class="btn btn-submit" onclick="window.location.href='sucesso.html'">ENVIAR DENÚNCIA</button>
        </main>
    </div>
</body>
</html>
